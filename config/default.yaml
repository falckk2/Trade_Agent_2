exchange:
  name: blofin
  demo_mode: true
  symbols:
    - "BTC-USDT"
    - "ETH-USDT"

risk:
  max_position_pct: 0.05
  max_exposure_pct: 0.20
  max_drawdown_pct: 0.10
  default_stop_loss_pct: 0.02
  default_take_profit_pct: 0.04
  # Reject signals weaker than this threshold (0.0–1.0).
  # SMA crossover signals typically produce strengths < 0.05 so the code
  # default of 0.3 would filter almost everything — keep at 0.05 for SMA
  # strategies and raise only when using strategies with stronger signals.
  min_signal_strength: 0.05

engine:
  # 1H chosen by backtest sweep 2026-06-10 (scripts/tune_strategies.py,
  # Jan-Apr 2026 in-sample / May-Jun out-of-sample): every SMA/RSI parameter
  # combination was net-negative after fees on 5m for both symbols, while
  # SMA crossovers on 1H were modestly positive in both windows.
  timeframe: "1H"
  candle_limit: 200
  # Tick cadence. With 5m candles, strategy signals can only change once per
  # candle, so very short intervals mostly burn REST calls (FABLE-008).
  # 30s keeps the software stop-loss backstop reasonably fresh; the primary
  # protection is the exchange-side TP/SL attached to every entry (FABLE-001).
  interval_seconds: 30

dashboard:
  host: "127.0.0.1"
  port: 8050
  refresh_interval_ms: 2000

data:
  data_dir: "data"

# TradingView alert webhook receiver (FABLE-017). Requires WEBHOOK_SECRET in
# the environment/.env — the server refuses to start without it. TradingView
# only delivers webhooks to ports 80/443, so on a VPS put a reverse proxy
# with TLS (e.g. caddy) in front of this port. See docs/tradingview_webhook.md.
webhook:
  enabled: false
  host: "0.0.0.0"
  port: 8080
  path: "/webhook/tradingview"
  # Optional source-IP allowlist — only useful when this port is exposed
  # directly (behind a reverse proxy the remote IP is the proxy; allowlist
  # there instead). TradingView's published alert IPs as of 2026:
  # 52.89.214.238, 34.212.75.30, 54.218.53.128, 52.32.178.7
  allowed_ips: []
